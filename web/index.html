<!doctype html>
<html>
  <head>
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta
      name="description"
      content="cashify - Manage your finances effortlessly."
    />

    <!-- PWA / iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="cashify" />
    <link rel="apple-touch-icon" href="assets/icon.png" />
    <link rel="icon" type="image/png" href="assets/icon.png" />

    <title>cashify</title>
    <link rel="manifest" href="manifest.json" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <style>
      body {
        margin: 0;
        background-color: #fdfdf6;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #11140e;
        }
      }

      #splash {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        transition: opacity 0.4s ease-out;
      }

      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <script>
      function removeSplashFromWeb() {
        const splash = document.getElementById("splash");
        if (!splash) return;
        splash.classList.add("hidden");
        setTimeout(() => splash.remove(), 400);
        document.body.style.background = "transparent";
      }
    </script>
  </head>
  <body>
    <picture id="splash">
      <source
        srcset="
          splash/img/light-1x.png 1x,
          splash/img/light-2x.png 2x,
          splash/img/light-3x.png 3x,
          splash/img/light-4x.png 4x
        "
        media="(prefers-color-scheme: light)"
      />
      <source
        srcset="
          splash/img/dark-1x.png 1x,
          splash/img/dark-2x.png 2x,
          splash/img/dark-3x.png 3x,
          splash/img/dark-4x.png 4x
        "
        media="(prefers-color-scheme: dark)"
      />
      <img aria-hidden="true" src="splash/img/light-1x.png" alt="" />
    </picture>

    <script src="flutter_bootstrap.js"></script>
    <script>
      _flutter.loader.load({
        onEntrypointLoaded: async function (engineInitializer) {
          const appRunner = await engineInitializer.initializeEngine();
          await appRunner.runApp();
          removeSplashFromWeb();
        },
      });
    </script>
  </body>
</html>
